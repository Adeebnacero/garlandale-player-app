  <h1>Garlandale FC</h1>
  <p class="subtitle">Player Portal</p>

  <div id="config-warning" class="config-warning" style="display:none;">
    This app isn't connected to a Supabase project yet — fill in
    <code>config.js</code> with your Project URL and anon key.
  </div>

  <div id="login-error" class="login-error"></div>

  <form id="login-form">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" required />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" required />
    <button type="submit" id="submit-btn">Sign in</button>
  </form>

  <p class="login-note">
    Use the email your coach or the club sent your invite to.
  </p>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const configWarning = document.getElementById('config-warning');
  const loginError = document.getElementById('login-error');
  const form = document.getElementById('login-form');
  const submitBtn = document.getElementById('submit-btn');

  const configured = SUPABASE_URL && SUPABASE_ANON_KEY;
  if (!configured) {
    configWarning.style.display = 'block';
  }

  const supabase = configured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  // If already signed in, skip straight to the dashboard.
  if (supabase) {
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'home.html';
    });
  }

  function showError(message) {
    loginError.textContent = message;
    loginError.classList.add('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.classList.remove('visible');

    if (!configured) {
      showError('This app has no Supabase connection configured yet.');
      return;
    }

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showError(
        error.message === 'Invalid login credentials'
          ? 'Incorrect email or password.'
          : error.message
      );
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
      return;
    }

    window.location.href = 'home.html';
  });

  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
</script>
