    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="profile.html" style="color: var(--gold); font-size: 13px; text-decoration: none;">Profile</a>
      <button id="logout-btn">Sign out</button>
    </div>
  </header>
  <main>
    <p class="greeting">Welcome back,</p>
    <h1 id="player-name">—</h1>

    <div class="card">
      <p class="card-label">Subscription balance</p>
      <div id="balance-loading" style="color: var(--inkSoft); font-size: 14px;">Loading your balance…</div>
      <div id="balance-error" class="login-error" style="display:none;"></div>
      <div id="balance-content" style="display:none;">
        <p class="balance-amount" id="balance-amount">—</p>
        <span class="pill" id="balance-pill">—</span>
        <p class="pill-reason" id="balance-reason"></p>
      </div>
    </div>

    <div class="card">
      <p class="card-label">Next fixture</p>
      <p class="fixture-teams">Garlandale FC vs Rondebosch United</p>
      <p class="fixture-when">Sat, 26 July · 09:00 kickoff</p>
    </div>

    <p class="footnote">
      Balance above is your real data. Fixture card is still placeholder —
      that's the next iteration.
    </p>
  </main>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const loading = document.getElementById('loading');
  const app = document.getElementById('app');

  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    loading.textContent = 'This app has no Supabase connection configured yet.';
    throw new Error('Missing Supabase config');
  }

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const { data } = await supabase.auth.getSession();
  if (!data.session) {
    window.location.href = 'index.html';
  } else {
    loading.style.display = 'none';
    app.style.display = 'block';
    loadBalance(data.session.access_token);
  }

  async function loadBalance(accessToken) {
    const balanceLoading = document.getElementById('balance-loading');
    const balanceError = document.getElementById('balance-error');
    const balanceContent = document.getElementById('balance-content');

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/get-my-balance`, {
        headers: { Authorization: `Bearer ${accessToken}` },
      });
      const body = await res.json();

      if (!res.ok) {
        throw new Error(body.error || 'Could not load balance');
      }

      const money = (n) =>
        'R' + Math.abs(n).toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      document.getElementById('player-name').textContent = body.name || 'Player';

      const pillStyles = {
        green: { bg: 'var(--greenSoft)', fg: 'var(--green)', label: 'Compliant' },
        amber: { bg: 'var(--amberSoft)', fg: 'var(--amber)', label: 'Payment due' },
        red: { bg: 'var(--dangerSoft)', fg: 'var(--danger)', label: 'Non-compliant' },
        inactive: { bg: 'var(--paperDim)', fg: 'var(--inkSoft)', label: 'Inactive' },
      };
      const style = pillStyles[body.status] || pillStyles.amber;

      document.getElementById('balance-amount').textContent = money(body.balance);
      const pill = document.getElementById('balance-pill');
      pill.textContent = style.label;
      pill.style.background = style.bg;
      pill.style.color = style.fg;
      document.getElementById('balance-reason').textContent = body.reason;

      balanceLoading.style.display = 'none';
      balanceContent.style.display = 'block';
    } catch (err) {
      balanceLoading.style.display = 'none';
      balanceError.textContent = err.message;
      balanceError.classList.add('visible');
      balanceError.style.display = 'block';
    }
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'index.html';
  });

  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
</script>
